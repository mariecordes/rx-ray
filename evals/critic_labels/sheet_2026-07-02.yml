  cited_text: CONTRAINDICATIONS Lisinopril and hydrochlorothiazide tablets are contraindicated
    in patients who are hypersensitive to any component of this product and in patients with
    a history of angioedema related to previous treatment with an angiotensin converting enzyme
    inhibitor and in patients with hereditary or idiopathic angioedema. Because of the hydrochlorothiazide
    component, this product is contraindicated in patients with anuria or hypersensitivity
    to other sulfonamide-derived drugs. Lisinopril and hydrochlorothiazide tablets are contraindicated
    in combination with a neprilysin inhibitor (e.g., sacubitril). Do not administer lisinopril
