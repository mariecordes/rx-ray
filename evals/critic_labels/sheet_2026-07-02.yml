- item: 3
  question_id: q14_interaction_cetirizine_ibuprofen_aspirin
  question: Can I take cetirizine and ibuprofen together if I'm also taking aspirin?
  response: The retrieved labels point to **caution with ibuprofen when aspirin is already
    being used**, because ibuprofen’s label says it can interfere with aspirin’s antiplatelet
    (blood-thinning) effect and that taking multiple NSAIDs (nonsteroidal anti-inflammatory
    drugs) raises stomach-bleeding risk. The cetirizine label does not add a specific ibuprofen/aspirin
    interaction signal in the retrieved text; its warnings focus on allergy, drowsiness, liver/kidney
    disease, sedatives, and pregnancy/breast-feeding.
  limitations:
  - RxNorm terminology overlap is not evidence of a clinical interaction.
  - The retrieved labels do not provide a full, patient-specific dosing plan for combining
    these medicines.
  - The retrieved evidence is limited to the label sections shown here; it does not cover
    every possible formulation or all real-world interaction scenarios.
  claim: Ibuprofen’s retrieved label says **aspirin** can have its antiplatelet activity interfered
    with when ibuprofen is taken together, and that the interaction is reduced if immediate-release
    low-dose aspirin is taken at least 2 hours before a once-daily ibuprofen regimen; it also
    says this timing finding does **not** extend to enteric-coated low-dose aspirin.
  cited_source:
    source_id: 5e595111-8477-4ec7-8d32-a0aeabc04e1a
    section: drug_interactions
  cited_text: Preexisting asthma Patients with asthma may have aspirin-sensitive asthma. The
    use of aspirin in patients with aspirin-sensitive asthma has been associated with severe
    bronchospasm, which can be fatal. Since cross reactivity, including bronchospasm, between
    aspirin and NSAIDs has been reported in such aspirin-sensitive patients, ibuprofen tablets
    should not be administered to patients with this form of aspirin sensitivity and should
    be used with caution in patients with preexisting asthma.
