- item: 5
  question_id: q13_interaction_amoxicillin_warfarin
  question: Do amoxicillin and warfarin interact?
  response: 'The retrieved labels **do describe an interaction concern** between amoxicillin
    and oral anticoagulants like warfarin: they report increased prothrombin time, which means
    the blood may take longer to clot, and they call for monitoring when the drugs are used
    together. The warfarin label also notes that antibiotics and other drugs can affect INR
    (a blood-clotting test), so the labels point toward **closer INR monitoring and possible
    dose adjustment** rather than a simple no-interaction answer.'
  limitations:
  - RxNorm terminology overlap is not evidence of a clinical interaction.
  - The retrieved labels do not provide a patient-specific recommendation or a quantified
    risk for this exact drug pair.
  - The amoxicillin label text refers to oral anticoagulants generally; it does not name every
    anticoagulant in that sentence.
  claim: Warfarin’s boxed warning says it can cause **major or fatal bleeding**, which is
    why INR changes from interacting drugs matter clinically.
  cited_source:
    source_id: b8c33971-54b3-4971-bf7f-1bec66999a29
    section: boxed_warning
  cited_text: 'WARNING: BLEEDING RISK Warfarin sodium can cause major or fatal bleeding [see
    Warnings and Precautions ( 5.1 )] . Perform regular monitoring of INR in all treated patients
    [see Dosage and Administration ( 2.1 )] . Drugs, dietary changes, and other factors affect
    INR levels achieved with warfarin sodium therapy [see Drug Interactions ( 7 )] . Instruct
    patients about prevention measures to minimize risk of bleeding and to report signs and
    symptoms of bleeding [see Patient Counseling Information ( 17 )] . WARNING: BLEEDING RISK
    See full prescribing information for complete boxed warning. Warfarin sodium can cause
    major or fatal bleeding. ( 5.1 ) Perform regular monitoring of INR in all treated patients.
    ( 2.1 ) Drugs, dietary changes, and other factors affect INR levels achieved with warfarin
    sodium therapy. ( 7 ) Instruct patients about prevention measures to minimize risk of
    bleeding and to report signs and symptoms of bleeding. ( 17 )'
